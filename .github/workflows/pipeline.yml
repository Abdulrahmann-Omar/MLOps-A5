name: model-pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      label_noise:
        description: 'Label noise fraction (0.0 = clean/pass, 0.9 = noisy/fail)'
        required: false
        default: '0.0'

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull data with DVC
        run: |
          dvc pull || echo "Dataset already present or DVC remote not configured"

      - name: Train model and log to MLflow
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          LABEL_NOISE: ${{ github.event.inputs.label_noise }}
        run: |
          # Fall back to local file store if no tracking URI secret is set
          export MLFLOW_TRACKING_URI="${MLFLOW_TRACKING_URI:-file:./mlruns}"
          export LABEL_NOISE="${LABEL_NOISE:-0.0}"
          python train.py --model-info-path model_info.txt --label-noise "${LABEL_NOISE}"

      - name: Upload model info and MLflow runs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: |
            model_info.txt
            mlruns/

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download model info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Check accuracy threshold in MLflow
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          export MLFLOW_TRACKING_URI="${MLFLOW_TRACKING_URI:-file:./mlruns}"
          python check_threshold.py --model-info-path model_info.txt --threshold 0.85

      - name: Mock Docker build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"